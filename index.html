<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>老板 SBTI 物种鉴定中心</title>
    <link rel="stylesheet" href="styles.css" />
    <meta name="bosssbti-api" content="https://api.bosssbti.com" />
  </head>
  <body>
    <header class="site-header">
      <h1>老板SBTI测试</h1>
    </header>

    <main>
      <section id="screen-auth-check" class="card">
        <p class="muted">正在加载…</p>
      </section>

      <section id="screen-landing" class="card" hidden>
        <figure class="hero-single" aria-label="加油，把公司干倒闭！">
          <img src="assets/hero-boom.png" alt="加油，把公司干倒闭！" loading="eager" />
        </figure>
        <h2 class="hero-title">
          <span class="hero-title-line">对你的老板恨之入骨？</span>
          <span class="hero-title-line">快来测测你的老板是什么脏东西吧！</span>
        </h2>
        <p class="warn">请基于真实经历作答，不要替老板洗白。</p>
        <button type="button" id="btn-start" class="primary">开始鉴定</button>
      </section>

      <section id="screen-quiz" class="card" hidden>
        <p id="quiz-progress" class="muted"></p>
        <p id="quiz-phase" class="muted"></p>
        <h2 id="question-title"></h2>
        <p id="question-scenario" class="scenario"></p>
        <div id="question-options" class="options"></div>
        <div id="quiz-nav" class="quiz-nav"></div>
      </section>

      <section id="screen-result" class="card" hidden>
        <h2>鉴定报告</h2>
        <div id="result-main" class="result-block"></div>
        <div id="result-sub"></div>
        <div id="result-radar" class="result-block"></div>
        <p id="result-advice" class="advice"></p>
        <button type="button" id="btn-retry" class="secondary">结束并开始新的测试</button>
      </section>
    </main>

    <footer class="site-footer">
      <small>内容来源：《老板SBTI图鉴》设计稿与图鉴条目。</small>
    </footer>

    <script src="types-data.js"></script>
    <script src="quiz-data.js"></script>
    <script src="api.js"></script>
    <script src="pay-modal.js"></script>
    <script src="share.js"></script>
    <script src="share-poster.js"></script>
    <script>
      /* 进入闸门：
       *   - 默认：静默建号（无 cookie 则 create）→ 直接进入测试（Q1），彻底无历史记忆；
       *   - ?after_exit=1：用户刚从报告页退出 → 登出+新建号，落到极简 landing，让他点"开始鉴定"；
       *   - 其余异常：展示可重试的错误提示。
       *
       * 不再使用 /login.html 作为默认入口；login.html 仍保留作为"老账号码恢复"入口供少数老用户手动访问。
       */
      (function () {
        const el = (id) => document.getElementById(id);
        const params = new URLSearchParams(location.search);
        const afterExit = params.get("after_exit") === "1";

        async function ensureFreshAccount() {
          /* after_exit=1 场景：即便后端 cookie 还没清干净，也强制新建一个全新账号，
           * 真正做到"退出再进就是新账号"。*/
          try { await window.BossAPI.account.logout(); } catch {}
          await window.BossAPI.account.create({});
        }

        async function ensureLoggedIn() {
          try {
            await window.BossAPI.account.me();
            return true;
          } catch (err) {
            if (err && (err.status === 401 || err.code === "UNAUTH")) {
              await window.BossAPI.account.create({});
              return true;
            }
            throw err;
          }
        }

        function showLanding() {
          el("screen-auth-check").hidden = true;
          el("screen-landing").hidden = false;
        }

        /* 微信内置浏览器 / 企业微信检测。
         * 复用 pay-modal.js 同名函数的逻辑，但独立定义，避免加载顺序依赖。*/
        function isWeChatBrowser() {
          return /MicroMessenger|wxwork/i.test(navigator.userAgent || "");
        }

        async function copyTextFallback(s) {
          try { await navigator.clipboard.writeText(s); return true; } catch {}
          try {
            const ta = document.createElement("textarea");
            ta.value = s;
            ta.style.cssText = "position:fixed;left:-9999px;top:-9999px;";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            return true;
          } catch { return false; }
        }

        /* 在封面页启动阶段，若检测到微信 UA，立即展示引导蒙层，阻止用户进入测试。
         * 复用 styles.css 里的 .wx-guide-* 样式（上一版已添加）。*/
        function showWeChatGuide() {
          el("screen-auth-check").hidden = true;
          const link = location.href;
          const host = document.createElement("div");
          host.className = "wx-guide-host";
          host.setAttribute("role", "dialog");
          host.setAttribute("aria-modal", "true");

          const mask = document.createElement("div");
          mask.className = "wx-guide-mask";

          const arrow = document.createElement("div");
          arrow.className = "wx-guide-arrow";
          arrow.setAttribute("aria-hidden", "true");
          arrow.textContent = "↗";

          const arrowLabel = document.createElement("div");
          arrowLabel.className = "wx-guide-arrow-label";
          arrowLabel.textContent = "请点这里 ···";

          const card = document.createElement("div");
          card.className = "wx-guide-card";

          const title = document.createElement("h3");
          title.className = "wx-guide-title";
          title.textContent = "请用浏览器打开本页";
          card.appendChild(title);

          const desc = document.createElement("p");
          desc.className = "wx-guide-desc";
          desc.textContent = "在微信内无法直接完成支付，也无法正确返回报告页。请点击右上角 ··· 菜单 → 选择「在浏览器打开」，再来鉴定老板！";
          card.appendChild(desc);

          const linkBox = document.createElement("div");
          linkBox.className = "wx-guide-link";
          linkBox.textContent = link;
          card.appendChild(linkBox);

          const copyBtn = document.createElement("button");
          copyBtn.className = "primary wx-guide-copy";
          copyBtn.textContent = "复制本页链接";
          copyBtn.addEventListener("click", async () => {
            const ok = await copyTextFallback(link);
            copyBtn.textContent = ok ? "已复制 · 请到浏览器粘贴打开" : "复制失败，请长按选择上方链接";
          });
          card.appendChild(copyBtn);

          host.appendChild(mask);
          host.appendChild(arrow);
          host.appendChild(arrowLabel);
          host.appendChild(card);
          document.body.appendChild(host);
        }

        function startQuizNow() {
          el("screen-auth-check").hidden = true;
          /* 由 app.js 暴露全局 startQuiz，这里调用即可把用户直接拉进 Q1。*/
          if (typeof window.__BOSS_APP_START__ === "function") {
            window.__BOSS_APP_START__();
          } else {
            /* 极罕见：app.js 还没加载完。等一帧再试。*/
            setTimeout(startQuizNow, 30);
          }
        }

        async function boot() {
          try {
            /* 产品要求：所有入口都先显示封面页（hero + 标题 + 开始鉴定按钮）。
             * - after_exit=1：强制清 cookie + 新建号，保证"退出再进 = 全新账号"；
             * - 其它情形：静默保证已登录（没有 cookie 就自动建号）。
             * 两条路径都走到 showLanding()，用户点击按钮才进入 Q1。*/
            if (afterExit) {
              await ensureFreshAccount();
              const u = new URL(location.href);
              u.searchParams.delete("after_exit");
              history.replaceState(null, "", u.toString());
            } else {
              await ensureLoggedIn();
            }
            /* 微信内置浏览器：引导切到外部浏览器，不让用户做完题再被拦截。*/
            if (isWeChatBrowser()) { showWeChatGuide(); return; }

            showLanding();
          } catch (err) {
            el("screen-auth-check").innerHTML =
              `<p class="warn">准备账号失败：${(err && err.message) || err}</p>
               <button type="button" class="secondary" onclick="location.reload()">重试</button>`;
          }
        }

        el("btn-start").addEventListener("click", () => {
          el("screen-landing").hidden = true;
          startQuizNow();
        });

        boot();
      })();
    </script>

    <script src="app.js"></script>
  </body>
</html>
