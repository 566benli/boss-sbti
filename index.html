<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>老板 SBTI 物种鉴定中心</title>
    <link rel="stylesheet" href="styles.css" />
    <meta name="bosssbti-api" content="https://api.bosssbti.com" />
  </head>
  <body>
    <header class="site-header">
      <h1>老板SBTI测试</h1>
    </header>

    <main>
      <section id="screen-auth-check" class="card">
        <p class="muted">正在验证账号…</p>
      </section>

      <section id="screen-landing" class="card" hidden>
        <div class="menu-header" id="menu-header">
          <div class="menu-acct">
            <span class="menu-acct-code" id="menu-acct-code">ACCT-000</span>
            <span class="menu-acct-hint" id="menu-acct-hint">当前账号 · 所有记录都归属它</span>
          </div>
          <button type="button" id="btn-logout" class="menu-logout">切换账号</button>
        </div>

        <figure class="hero-single" aria-label="加油，把公司干倒闭！">
          <img src="assets/hero-boom.png" alt="加油，把公司干倒闭！" loading="eager" />
        </figure>
        <h2 class="hero-title">
          <span class="hero-title-line">对你的老板恨之入骨？</span>
          <span class="hero-title-line">快来测测你的老板是什么脏东西吧！</span>
        </h2>
        <p class="warn">请基于真实经历作答，不要替老板洗白。</p>
        <button type="button" id="btn-start" class="primary">开始鉴定</button>

        <div class="history-section" id="history-section">
          <h3>我的已解锁报告</h3>
          <ul class="history-list" id="history-list"></ul>
          <p class="history-empty" id="history-empty" hidden>
            还没有已解锁的报告 · 完成测试并解锁后，历史记录会出现在这里。
          </p>
        </div>
      </section>

      <section id="screen-quiz" class="card" hidden>
        <p id="quiz-progress" class="muted"></p>
        <p id="quiz-phase" class="muted"></p>
        <h2 id="question-title"></h2>
        <p id="question-scenario" class="scenario"></p>
        <div id="question-options" class="options"></div>
        <div id="quiz-nav" class="quiz-nav"></div>
      </section>

      <section id="screen-result" class="card" hidden>
        <h2>鉴定报告</h2>
        <div id="result-main" class="result-block"></div>
        <div id="result-sub"></div>
        <div id="result-radar" class="result-block"></div>
        <p id="result-advice" class="advice"></p>
        <button type="button" id="btn-retry" class="secondary">返回主菜单（登出）</button>
      </section>
    </main>

    <footer class="site-footer">
      <small>内容来源：《老板SBTI图鉴》设计稿与图鉴条目。</small>
    </footer>

    <script src="types-data.js"></script>
    <script src="quiz-data.js"></script>
    <script src="api.js"></script>
    <script src="pay-modal.js"></script>
    <script src="share.js"></script>
    <script src="share-poster.js"></script>
    <script>
      /* 鉴权闸门：未登录 → /login.html；已登录 → 渲染主菜单 + 历史报告。 */
      (function () {
        const el = (id) => document.getElementById(id);

        function fmtDate(ts) {
          if (!ts) return "";
          const d = new Date(ts);
          return d.toLocaleString("zh-CN", {
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit",
          });
        }

        function renderHistory(paidReports) {
          const listHost = el("history-list");
          const empty = el("history-empty");
          listHost.innerHTML = "";
          if (!paidReports || !paidReports.length) {
            empty.hidden = false;
            return;
          }
          empty.hidden = true;
          paidReports.forEach((r) => {
            const li = document.createElement("li");
            li.className = "history-item";
            const name = (window.BOSS_TYPES && window.BOSS_TYPES[r.mainType]
              && window.BOSS_TYPES[r.mainType].name) || r.mainType || "—";
            li.innerHTML = `
              <div class="history-item-main">
                <span class="history-item-code">${r.mainType || "—"}｜${name}</span>
                <span class="history-item-date">${fmtDate(r.paidAt || r.completedAt)}</span>
              </div>
              <a class="history-item-cta" href="/report.html?sid=${encodeURIComponent(r.sid)}&from=resume">查看 / 分享 →</a>
            `;
            listHost.appendChild(li);
          });
        }

        async function boot() {
          try {
            const me = await window.BossAPI.account.me();
            const code = (me.user && me.user.prettyCode) || me.user.code || "—";
            el("menu-acct-code").textContent = code;
            el("menu-acct-hint").textContent = me.user.nickname
              ? `${me.user.nickname} · 所有记录都归属此账号`
              : "当前账号 · 所有记录都归属它";
            renderHistory(me.paidReports || []);
            window.__BOSS_ME__ = me.user;
            el("screen-auth-check").hidden = true;
            el("screen-landing").hidden = false;
          } catch (err) {
            if (err && (err.status === 401 || err.code === "UNAUTH")) {
              location.href = "/login.html";
              return;
            }
            el("screen-auth-check").innerHTML =
              `<p class="warn">账号检查失败：${(err && err.message) || err}</p>
               <a class="secondary" href="/login.html">去登录</a>`;
          }
        }

        el("btn-logout").addEventListener("click", async () => {
          try { await window.BossAPI.account.logout(); } catch {}
          location.href = "/login.html";
        });

        boot();
      })();
    </script>

    <script src="app.js"></script>
  </body>
</html>
