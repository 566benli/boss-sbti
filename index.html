<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>老板 SBTI 物种鉴定中心</title>
    <link rel="stylesheet" href="styles.css" />
    <meta name="bosssbti-api" content="https://api.bosssbti.com" />
  </head>
  <body>
    <header class="site-header">
      <h1>老板SBTI测试</h1>
    </header>

    <main>
      <section id="resume-banner" class="resume-banner" hidden>
        <div class="resume-banner-text">🎉 你有一份已解锁的完整鉴定报告</div>
        <a id="resume-banner-link" class="resume-banner-cta" href="/report.html">查看 / 下载 →</a>
        <button type="button" id="resume-banner-close" class="resume-banner-close" aria-label="关闭">×</button>
      </section>

      <section id="screen-landing" class="card">
        <figure class="hero-single" aria-label="加油，把公司干倒闭！">
          <img src="assets/hero-boom.png" alt="加油，把公司干倒闭！" loading="eager" />
        </figure>
        <h2 class="hero-title">
          <span class="hero-title-line">对你的老板恨之入骨？</span>
          <span class="hero-title-line">快来测测你的老板是什么脏东西吧！</span>
        </h2>
        <p class="warn">请基于真实经历作答，不要替老板洗白。</p>
        <button type="button" id="btn-start" class="primary">开始鉴定</button>
      </section>

      <section id="screen-quiz" class="card" hidden>
        <p id="quiz-progress" class="muted"></p>
        <p id="quiz-phase" class="muted"></p>
        <h2 id="question-title"></h2>
        <p id="question-scenario" class="scenario"></p>
        <div id="question-options" class="options"></div>
        <div id="quiz-nav" class="quiz-nav"></div>
      </section>

      <section id="screen-result" class="card" hidden>
        <h2>鉴定报告</h2>
        <div id="result-main" class="result-block"></div>
        <div id="result-sub"></div>
        <div id="result-radar" class="result-block"></div>
        <p id="result-advice" class="advice"></p>
        <button type="button" id="btn-retry" class="secondary">返回首页</button>
      </section>
    </main>

    <footer class="site-footer">
      <small>内容来源：《老板SBTI图鉴》设计稿与图鉴条目。</small>
    </footer>

    <script src="types-data.js"></script>
    <script src="quiz-data.js"></script>
    <script src="api.js"></script>
    <script src="pay-modal.js"></script>
    <script src="share.js"></script>
    <script src="share-poster.js"></script>
    <script src="app.js"></script>
    <script>
      /* 检测到已付费 sid 时，在首页顶部展示「查看已解锁报告」入口。 */
      (function () {
        const BANNER_DISMISSED_KEY = "BOSSSBTI_RESUME_DISMISS_SID";
        const banner = document.getElementById("resume-banner");
        const link = document.getElementById("resume-banner-link");
        const closeBtn = document.getElementById("resume-banner-close");
        if (!banner || !link || !closeBtn || !window.BossAPI) return;

        const sid = window.BossAPI.sid.load();
        if (!sid) return;

        let dismissed = null;
        try { dismissed = localStorage.getItem(BANNER_DISMISSED_KEY); } catch {}
        if (dismissed === sid) return;

        window.BossAPI.report.full(sid).then(() => {
          link.href = `/report.html?sid=${encodeURIComponent(sid)}&from=resume`;
          banner.hidden = false;
        }).catch(() => { /* 未付费 or 错误：不显示 */ });

        closeBtn.addEventListener("click", () => {
          banner.hidden = true;
          try { localStorage.setItem(BANNER_DISMISSED_KEY, sid); } catch {}
        });
      })();
    </script>
  </body>
</html>
