name = "boss-sbti-api"
main = "src/index.js"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# 把 api.bosssbti.com 做成 Workers Custom Domain：
# wrangler deploy 时会自动在 Cloudflare 上建好 DNS 记录、签 TLS 证书、并把流量路由到本 Worker。
# 不需要再手动加 CNAME。
[[routes]]
pattern = "api.bosssbti.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "boss-sbti"
database_id = "b14c07b0-a123-4da2-b6de-f173d0e780fd"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "5ac83e34fa2847c18b1c50ca7127233c"

# vars（非敏感）
[vars]
PAYMENT_MODE = "xunhupay"
ALLOWED_ORIGINS = "https://bosssbti.com,https://www.bosssbti.com,https://566benli.github.io"
PRICE_CENT = "99"
# 前端应该显示的支付渠道按钮。申请支付宝渠道通过后改为 "wechat,alipay"。
XUNHUPAY_CHANNELS = "wechat"

# 敏感密钥通过 `wrangler secret put` 设置：
#   ADMIN_PASSWORD          —— 管理员登录密码
#   ADMIN_JWT_SECRET        —— HS256 签名密钥
#   IP_HASH_SALT            —— 每日 IP 哈希盐
#   MOCK_WEBHOOK_SECRET     —— Phase 1 demo 付费按钮签名
#
# Phase 2 选项 A：虎皮椒 xunhupay（推荐，零开户费 + 直接支持支付宝）
#   XUNHUPAY_APPID          —— 虎皮椒 APP ID（xunhupay.com 后台"我的支付渠道"）
#   XUNHUPAY_APPSECRET      —— 虎皮椒 APPSECRET
#   XUNHUPAY_NOTIFY_URL     —— 可选，覆盖 notify 域名（默认 https://api.bosssbti.com）
#
# Phase 2 选项 B：PayJS payjs.cn（合规度更高，但一次性 300 元开户费）
#   PAYJS_MCHID             —— 商户号
#   PAYJS_KEY               —— 通信密钥
#   PAYJS_PREFER            —— "cashier"（默认）/ "native"
#   PAYJS_NOTIFY_URL        —— 可选覆盖 notify 域名
#
# 切真实支付时：
#   1) wrangler secret put XUNHUPAY_APPID （或 PAYJS_MCHID）
#   2) wrangler secret put XUNHUPAY_APPSECRET （或 PAYJS_KEY）
#   3) 把上面 [vars] 里的 PAYMENT_MODE 改成 "xunhupay"（或 "payjs"）
#   4) npx wrangler deploy
